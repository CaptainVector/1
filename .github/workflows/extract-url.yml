name: Extract URL from page

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'URL of the page to scrape'
        required: true
        default: 'https://example.com'

jobs:
  scrape:
    runs-on: ubuntu-latest

    env:
      # اگر می‌خواهید پروکسی استفاده کنید، مقدار آن را به اینجا وارد کنید
      # PROXY_URL: "http://user:pass@proxy:3128"
      # در این مثال، بدون پروکسی اجرا می‌شود
      PROXY_URL: ""

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run extractor
        run: python extract.py "${{ github.event.inputs.target_url }}"

      - name: Commit changes
        env:
          GIT_AUTHOR_NAME: github-actions
          GIT_AUTHOR_EMAIL: github-actions@github.com
          GIT_COMMITTER_NAME: github-actions
          GIT_COMMITTER_EMAIL: github-actions@github.com
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"
          git add .
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update URLs from ${{ github.event.inputs.target_url }}"
            git push
          fi
